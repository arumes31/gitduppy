name: Create Release

on:
  release:
    types: [published]

jobs:
  build:
    name: Build Release Artifacts
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact_name: gitduppy-linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            artifact_name: gitduppy-linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact_name: gitduppy-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact_name: gitduppy-darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact_name: gitduppy-windows-amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: |
            go.sum
            **/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.event.release.tag_name }} -X main.commit=${{ github.sha }} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o ${{ matrix.artifact_name }} ./cmd/server

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-checksums:
    name: Create Checksums
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: gitduppy-*
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          sha256sum * > gitduppy-checksums.txt
          cat gitduppy-checksums.txt

      - name: Upload checksums to release
        uses: softprops/action-gh-release@v2
        with:
          files: gitduppy-checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
