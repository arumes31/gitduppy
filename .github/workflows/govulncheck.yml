name: Govulncheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC

jobs:
  govulncheck:
    name: Scan for vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: |
            go.sum
            **/go.sum

      - name: Install govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck on dependencies
        run: |
          govulncheck ./... 2>&1 | tee vulncheck-report.txt || exit 1

      - name: Upload vulnerability report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vulncheck-report
          path: vulncheck-report.txt
          retention-days: 30

      - name: Create issue on vulnerability found
        if: failure()
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: Security vulnerability detected in dependencies
          content-filepath: vulncheck-report.txt
          labels: security,dependencies
