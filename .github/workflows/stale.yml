name: Close Stale Issues and PRs

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC

jobs:
  stale:
    name: Mark and Close Stale Items
    runs-on: ubuntu-latest
    steps:
      - name: Mark stale issues
        uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 7
          stale-issue-label: stale
          stale-issue-message: 'This issue has been automatically marked as stale because it has not had recent activity. It will be closed in 7 days if no further activity occurs. Please comment to keep it open or ask for help if you need assistance.'
          close-issue-message: 'This issue has been automatically closed due to inactivity. Please reopen if needed.'
          exempt-issue-labels: pinned,security,bug,help-wanted,enhancement
          operations-per-run: 100

      - name: Mark stale pull requests
        uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 7
          stale-pr-label: stale
          stale-pr-message: 'This PR has been automatically marked as stale because it has not had recent activity. It will be closed in 7 days if no further activity occurs. Please comment to keep it open or update the PR.'
          close-pr-message: 'This PR has been automatically closed due to inactivity. Please reopen if needed.'
          exempt-pr-labels: pinned,security,bug,help-wanted,enhancement,wip
          operations-per-run: 100
