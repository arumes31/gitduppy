version: '3.8'

services:
  gitduppy:
    build: .
    ports:
      - "7659:8080"
    environment:
      - GITMIRRORS_DATABASE_HOST=postgres
      - GITMIRRORS_DATABASE_PORT=5432
      - GITMIRRORS_DATABASE_NAME=gitduppy
      - GITMIRRORS_DATABASE_USER=gitduppy
      - GITMIRRORS_DATABASE_PASSWORD=gitduppy
      - GITMIRRORS_DATABASE_SSLMODE=disable
      - SERVER_PORT=8080
      - SERVER_HOST=0.0.0.0
      - GITMIRRORS_SECURITY_MASTER_KEY=${ENCRYPTION_KEY:-your-32-byte-long-encryption-key}
      - GITMIRRORS_SECURITY_SESSION_SECRET=${SESSION_SECRET:-your-32-byte-long-session-secret}
      - GITMIRRORS_SECURITY_CSRF_KEY=${CSRF_KEY:-your-32-byte-long-csrf-secret-12}
      - SMTP_HOST=${SMTP_HOST:-smtp.example.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-user@example.com}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-password}
    volumes:
      - ./data/gitduppy/repos:/app/repos
      - ./data/gitduppy/keys:/app/keys
      - ./data/gitduppy/backups:/app/backups
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - gitduppy-network

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=gitduppy
      - POSTGRES_USER=gitduppy
      - POSTGRES_PASSWORD=gitduppy
    volumes:
      # UPGRADE/MIGRATION: If upgrading from the legacy `./data/postgres` bind mount,
      # copy your data using: docker run --rm -v ./data/postgres:/from -v gitduppy_postgres_data:/to alpine sh -c "cp -a /from/. /to/"
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitduppy -d gitduppy"]
      interval: 10s
      timeout: 10s
      retries: 30
    restart: unless-stopped
    networks:
      - gitduppy-network

networks:
  gitduppy-network:
    driver: bridge

volumes:
  # Named volume for postgres database storage.
  # To migrate existing data from the legacy `./data/postgres` bind mount:
  # docker run --rm -v ./data/postgres:/from -v gitduppy_postgres_data:/to alpine sh -c "cp -a /from/. /to/"
  postgres_data: