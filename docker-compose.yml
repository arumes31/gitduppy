# The top-level `version` key is obsolete under the Compose Spec and is omitted.

services:
  gitduppy:
    build:
      context: .
      args:
        VERSION: ${VERSION:-dev}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    ports:
      - "7659:8080"
    # Cap resource usage so a runaway clone/search cannot starve the host.
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g
        reservations:
          memory: 512m
    environment:
      - GITMIRRORS_DATABASE_HOST=postgres
      - GITMIRRORS_DATABASE_PORT=5432
      - GITMIRRORS_DATABASE_NAME=gitduppy
      - GITMIRRORS_DATABASE_USER=gitduppy
      - GITMIRRORS_DATABASE_PASSWORD=gitduppy
      - GITMIRRORS_DATABASE_SSLMODE=disable
      - GITMIRRORS_SERVER_PORT=${SERVER_PORT:-8080}
      - GITMIRRORS_SERVER_HOST=${SERVER_HOST:-0.0.0.0}
      - GITMIRRORS_SERVER_BASE_URL=${SERVER_BASE_URL:-http://localhost:8080}
      - GITMIRRORS_SECURITY_MASTER_KEY=${ENCRYPTION_KEY:-your-32-byte-long-encryption-key}
      - GITMIRRORS_SECURITY_SESSION_SECRET=${SESSION_SECRET:-your-32-byte-long-session-secret}
      - GITMIRRORS_SECURITY_CSRF_KEY=${CSRF_KEY:-your-32-byte-long-csrf-secret-12}
      - GITMIRRORS_EMAIL_SMTP_HOST=${SMTP_HOST:-}
      - GITMIRRORS_EMAIL_SMTP_PORT=${SMTP_PORT:-587}
      - GITMIRRORS_EMAIL_SMTP_USER=${SMTP_USERNAME:-}
      - GITMIRRORS_EMAIL_SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - GITMIRRORS_EMAIL_FROM=${SMTP_FROM_EMAIL:-noreply@gitmirrors.local}
      - GITMIRRORS_OAUTH_GITHUB_CLIENT_ID=${OAUTH2_GITHUB_CLIENT_ID:-}
      - GITMIRRORS_OAUTH_GITHUB_CLIENT_SECRET=${OAUTH2_GITHUB_CLIENT_SECRET:-}
      - GITMIRRORS_OAUTH_GITLAB_CLIENT_ID=${OAUTH2_GITLAB_CLIENT_ID:-}
      - GITMIRRORS_OAUTH_GITLAB_CLIENT_SECRET=${OAUTH2_GITLAB_CLIENT_SECRET:-}
      - GITMIRRORS_OAUTH_GOOGLE_CLIENT_ID=${OAUTH2_GOOGLE_CLIENT_ID:-}
      - GITMIRRORS_OAUTH_GOOGLE_CLIENT_SECRET=${OAUTH2_GOOGLE_CLIENT_SECRET:-}
      # Supply your own admin password via the environment; no fixed value is
      # committed. If left unset, a random password is generated and (unless you
      # opt in below) never printed — see the README bootstrap section.
      - GITMIRRORS_BOOTSTRAP_ADMIN_PASSWORD=${BOOTSTRAP_ADMIN_PASSWORD:-}
      - GITMIRRORS_BOOTSTRAP_SHOW_PASSWORD=${BOOTSTRAP_SHOW_PASSWORD:-false}
    volumes:
      - ./data/gitduppy/repos:/app/repos
      - ./data/gitduppy/keys:/app/keys
      - ./data/gitduppy/backups:/app/backups
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Probe readiness (returns 503 when the DB is unreachable) rather than the
      # informational /health endpoint, which always returns 200.
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/v1/health/ready"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - gitduppy-network

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=gitduppy
      - POSTGRES_USER=gitduppy
      - POSTGRES_PASSWORD=gitduppy
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitduppy -d gitduppy"]
      interval: 10s
      timeout: 10s
      retries: 30
    restart: unless-stopped
    networks:
      - gitduppy-network

networks:
  gitduppy-network:
    driver: bridge
