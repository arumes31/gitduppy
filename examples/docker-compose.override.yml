# GitDuppy Docker Compose Override Example
# This file demonstrates how to customize the default docker-compose.yml

version: '3.8'

services:
  # Override gitduppy service configuration
  gitduppy:
    # Use a specific version instead of latest
    image: gitduppy/gitduppy:v1.0.0

    # Mount custom configuration file
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./data:/data
      - ./logs:/var/log/gitduppy

    # Custom environment variables
    environment:
      - CONFIG_FILE=/app/config.yaml
      - GITDUPPY_SERVER_PORT=9090
      - GITDUPPY_LOGGING_LEVEL=debug

    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

    # Health check
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9090/api/v1/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Add external database instead of using the default postgres service
  # db:
  #   image: postgres:14
  #   environment:
  #     - POSTGRES_DB=gitduppy
  #     - POSTGRES_USER=gitduppy
  #     - POSTGRES_PASSWORD=your-secure-password
  #   volumes:
  #     - db-data:/var/lib/postgresql/data
  #   networks:
  #     - gitduppy-network

  # Add Caddy reverse proxy for HTTPS
  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - gitduppy

# Networks
networks:
  gitduppy-network:
    driver: bridge

# Volumes
volumes:
  caddy_data:
  caddy_config: # db-data:
