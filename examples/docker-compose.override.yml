# GitDuppy Docker Compose Override Example
# This file demonstrates how to customize the default docker-compose.yml
# (place it next to docker-compose.yml as docker-compose.override.yml).

services:
  # Override gitduppy service configuration
  gitduppy:
    # Pin a specific released image instead of building locally
    image: ghcr.io/arumes31/gitduppy:latest

    # Container paths must match config.yaml's storage.* settings
    # (base_path=/app/storage/repos, ssh_path=/app/storage/ssh,
    # backup_path=/app/storage/backups).
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data/gitduppy/repos:/app/storage/repos
      - ./data/gitduppy/keys:/app/storage/ssh
      - ./data/gitduppy/backups:/app/storage/backups

    # Custom environment variables (env prefix is GITMIRRORS_, mapping to
    # config keys with _ for . — e.g. server.port -> GITMIRRORS_SERVER_PORT)
    environment:
      - GITMIRRORS_SERVER_PORT=9090
      - GITMIRRORS_SERVER_BASE_URL=https://git.example.com

    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

    # Health check (adjust the port if you changed GITMIRRORS_SERVER_PORT)
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/api/v1/health/ready" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Add external database instead of using the default postgres service
  # db:
  #   image: postgres:16-alpine
  #   environment:
  #     - POSTGRES_DB=gitduppy
  #     - POSTGRES_USER=gitduppy
  #     - POSTGRES_PASSWORD=your-secure-password
  #   volumes:
  #     - db-data:/var/lib/postgresql/data
  #   networks:
  #     - gitduppy-network

  # Add Caddy reverse proxy for HTTPS (see deployments/caddy/Caddyfile).
  # Caddy proxies WebSockets (the live log stream) automatically.
  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployments/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - gitduppy

# Networks
networks:
  gitduppy-network:
    driver: bridge

# Volumes
volumes:
  caddy_data:
  caddy_config: # db-data:
