{{define "base"}}
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.title}}</title>
    <link rel="icon" type="image/png" href="/static/images/logo.png">
    <link rel="apple-touch-icon" href="/static/images/apple-touch-icon.png">
    <link rel="stylesheet" href="/assets/fonts/fonts.css">
    <link rel="stylesheet" href="/assets/css/main.css?v={{.version}}">
    <link rel="stylesheet" href="/assets/css/highlight.min.css">
    <script src="/assets/js/lucide.min.js"></script>
    <script src="/assets/js/highlight.min.js"></script>
</head>
<body>
    <div class="app-layout">
        {{if .user}}
        <aside class="sidebar glass-panel">
            <div class="sidebar-header">
                <div class="logo-container sidebar-logo">
                    <img src="/static/images/logo.png" alt="GitDuppy Logo" class="logo-img">
                    <span class="logo-text">GitDuppy</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard" class="nav-item {{if eq .title "Dashboard - GitDuppy"}}active{{end}}">
                    <i data-lucide="layout-dashboard"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/repos" class="nav-item {{if eq .title "Repositories - GitDuppy"}}active{{end}}">
                    <i data-lucide="git-fork"></i>
                    <span>Repositories</span>
                </a>
                <a href="/search" class="nav-item {{if eq .title "Search - GitDuppy"}}active{{end}}">
                    <i data-lucide="search"></i>
                    <span>Code Search</span>
                </a>
                <a href="/config" class="nav-item {{if eq .title "Settings - GitDuppy"}}active{{end}}">
                    <i data-lucide="settings"></i>
                    <span>Settings</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="avatar">
                        <i data-lucide="user"></i>
                    </div>
                    <div class="user-details">
                        <span class="user-name">Admin</span>
                    </div>
                </div>
                <button id="logout-btn" class="btn btn-icon btn-ghost" title="Logout">
                    <i data-lucide="log-out"></i>
                </button>
            </div>
        </aside>
        {{end}}

        <main class="main-content">
            {{if .user}}
            <div id="maintenance-banner" class="maintenance-banner" style="display:none">
                <i data-lucide="wrench"></i>
                <span>Maintenance mode is enabled — scheduled mirroring is paused.</span>
            </div>
            {{end}}
            {{template "content" .}}
        </main>
    </div>

    <!-- Custom Confirm Modal -->
    <div id="custom-confirm-modal" class="modal-overlay" style="display:none">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <i data-lucide="github" class="icon-lg"></i>
                <h3 id="custom-confirm-title" class="modal-title">GitHub Integration</h3>
            </div>
            <div id="custom-confirm-message" class="modal-body text-muted">
                <!-- Message will be injected here -->
            </div>
            <div class="modal-actions mt-6">
                <button id="custom-confirm-cancel" class="btn btn-secondary">
                    <span>Cancel</span>
                </button>
                <button id="custom-confirm-ok" class="btn btn-primary btn-glow">
                    <span>OK</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="/assets/js/app.js?v={{.version}}"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
{{end}}
