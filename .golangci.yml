version: "2"
run:
  tests: false
linters:
  enable:
    - bodyclose
    - contextcheck
    - copyloopvar
    - dogsled
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - gocritic
    - goheader
    - goprintffuncname
    - gosec
    - makezero
    - mirror
    - misspell
    - nakedret
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - nosprintfhostport
    - protogetter
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - unconvert
    - wastedassign
    - zerologlint
  settings:
    govet:
      enable:
        - nilness
        - printf
        - unusedresult
    gocritic:
      # exitAfterDefer fires on cmd/server/main.go, where fatal startup errors use
      # log.Fatalf after best-effort defers (logger.Sync, database.Close). Skipping
      # that cleanup on a failed boot is intentional and idiomatic for an entrypoint,
      # so disable just this one check rather than scatter per-line nolints.
      disabled-checks:
        - exitAfterDefer
    nakedret:
      max-func-lines: 30
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
