version: '3.8'

services:
  gitduppy:
    build: .
    ports:
      - "7659:8080"
    environment:
      - DATABASE_URL=postgres://gitduppy:gitduppy@postgres:5432/gitduppy?sslmode=disable
      - SERVER_PORT=8080
      - SERVER_HOST=0.0.0.0
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
    volumes:
      - ./data/gitduppy/repos:/app/repos
      - ./data/gitduppy/keys:/app/keys
      - ./data/gitduppy/backups:/app/backups
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - gitduppy-network

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=gitduppy
      - POSTGRES_USER=gitduppy
      - POSTGRES_PASSWORD=gitduppy
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U gitduppy -d gitduppy" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - gitduppy-network


networks:
  gitduppy-network:
    driver: bridge
