version: '3.8'

services:
  gitduppy:
    build: .
    environment:
      - DATABASE_URL=postgres://gitduppy:gitduppy@postgres:5432/gitduppy?sslmode=disable
      - SERVER_PORT=8080
      - SERVER_HOST=0.0.0.0
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - OAUTH2_GITHUB_CLIENT_ID=${OAUTH2_GITHUB_CLIENT_ID}
      - OAUTH2_GITHUB_CLIENT_SECRET=${OAUTH2_GITHUB_CLIENT_SECRET}
      - OAUTH2_GOOGLE_CLIENT_ID=${OAUTH2_GOOGLE_CLIENT_ID}
      - OAUTH2_GOOGLE_CLIENT_SECRET=${OAUTH2_GOOGLE_CLIENT_SECRET}
    volumes:
      - ./data/gitduppy/repos:/app/repos
      - ./data/gitduppy/keys:/app/keys
      - ./data/gitduppy/backups:/app/backups
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      caddy:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - gitduppy-network

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=gitduppy
      - POSTGRES_USER=gitduppy
      - POSTGRES_PASSWORD=gitduppy
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U gitduppy -d gitduppy" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - gitduppy-network

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./data/caddy:/data
      - ./deployments/caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./data/gitduppy/repos:/srv/repos:ro
    environment:
      - DOMAIN=${DOMAIN:-yourdomain.com}
      - EMAIL=${EMAIL:-admin@yourdomain.com}
    depends_on:
      gitduppy:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:2019/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - gitduppy-network

networks:
  gitduppy-network:
    driver: bridge
