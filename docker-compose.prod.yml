# The top-level `version` key is obsolete under the Compose Spec and is omitted.

services:
  gitduppy:
    build: .
    ports:
      - "7659:8080"
    environment:
      - GITMIRRORS_DATABASE_HOST=postgres
      - GITMIRRORS_DATABASE_PORT=5432
      - GITMIRRORS_DATABASE_NAME=gitduppy
      - GITMIRRORS_DATABASE_USER=gitduppy
      - GITMIRRORS_DATABASE_PASSWORD=gitduppy
      - GITMIRRORS_DATABASE_SSLMODE=disable
      - GITMIRRORS_SERVER_PORT=${SERVER_PORT:-8080}
      - GITMIRRORS_SERVER_HOST=${SERVER_HOST:-0.0.0.0}
      - GITMIRRORS_SERVER_BASE_URL=${SERVER_BASE_URL:-http://localhost:8080}
      - GITMIRRORS_SECURITY_MASTER_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      - GITMIRRORS_SECURITY_SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET is required}
      - GITMIRRORS_SECURITY_CSRF_KEY=${CSRF_KEY:?CSRF_KEY is required}
      - GITMIRRORS_EMAIL_SMTP_HOST=${SMTP_HOST:-}
      - GITMIRRORS_EMAIL_SMTP_PORT=${SMTP_PORT:-587}
      - GITMIRRORS_EMAIL_SMTP_USER=${SMTP_USERNAME:-}
      - GITMIRRORS_EMAIL_SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - GITMIRRORS_EMAIL_FROM=${SMTP_FROM_EMAIL:-noreply@gitmirrors.local}
      - GITMIRRORS_OAUTH_GITHUB_CLIENT_ID=${OAUTH2_GITHUB_CLIENT_ID:-}
      - GITMIRRORS_OAUTH_GITHUB_CLIENT_SECRET=${OAUTH2_GITHUB_CLIENT_SECRET:-}
      - GITMIRRORS_OAUTH_GITLAB_CLIENT_ID=${OAUTH2_GITLAB_CLIENT_ID:-}
      - GITMIRRORS_OAUTH_GITLAB_CLIENT_SECRET=${OAUTH2_GITLAB_CLIENT_SECRET:-}
      - GITMIRRORS_OAUTH_GOOGLE_CLIENT_ID=${OAUTH2_GOOGLE_CLIENT_ID:-}
      - GITMIRRORS_OAUTH_GOOGLE_CLIENT_SECRET=${OAUTH2_GOOGLE_CLIENT_SECRET:-}
    # Container paths MUST match config.yaml's storage.* settings
    # (base_path=/app/storage/repos, ssh_path=/app/storage/ssh,
    # backup_path=/app/storage/backups). Earlier revisions mounted /app/repos,
    # /app/keys and /app/backups, which the app never wrote to — mirrors landed
    # in the container's ephemeral layer and were lost on recreation. Existing
    # mirrors re-clone automatically on the next scheduler pass; SSH keys must
    # be re-provisioned into ./data/gitduppy/keys.
    volumes:
      - ./data/gitduppy/repos:/app/storage/repos
      - ./data/gitduppy/keys:/app/storage/ssh
      - ./data/gitduppy/backups:/app/storage/backups
      - ./config.yaml:/app/config.yaml:ro
    # --- Container hardening (production) ------------------------------------
    # Block privilege escalation via setuid binaries. Compatible with the
    # entrypoint's root -> appuser drop, which lowers privileges rather than
    # raising them (su-exec runs before any workload).
    security_opt:
      - no-new-privileges:true
    # Give git an ephemeral, non-persistent scratch area for its temp files and
    # keep it off the persistent volumes. Also required for the read-only root
    # filesystem below.
    tmpfs:
      - /tmp
    # Immutable root filesystem: every writable path the app needs is a bind
    # mount (/app/storage/*) or tmpfs (/tmp), so nothing can modify the image at
    # runtime. Safe now that the mounts above align with config.yaml's storage
    # paths.
    read_only: true
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/v1/health" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - gitduppy-network

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=gitduppy
      - POSTGRES_USER=gitduppy
      - POSTGRES_PASSWORD=gitduppy
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U gitduppy -d gitduppy" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - gitduppy-network


networks:
  gitduppy-network:
    driver: bridge


