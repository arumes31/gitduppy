# Gitduppy Configuration
# Copy this file to config/config.yaml and modify as needed

server:
  port: 8080
  host: "0.0.0.0"
  read_timeout: "30s"
  write_timeout: "300s"
  idle_timeout: "120s"
  tls:
    enabled: false
    cert: ""
    key: ""
  trusted_proxies: []
  base_url: "http://localhost:8080"

database:
  host: "localhost"
  port: 5432
  name: "gitmirrors"
  user: "gitmirrors"
  password: ""
  sslmode: "disable"
  # Connection pool sizing. Each gitduppy replica opens up to max_open_conns
  # connections to Postgres, so size these against Postgres `max_connections`
  # (default 100), leaving headroom for other clients and for superuser/admin
  # connections: replicas * max_open_conns must stay comfortably below it. For
  # example, with the default max_connections=100, four replicas at 25 already
  # reach 100 — lower max_open_conns (or raise Postgres max_connections) before
  # scaling out further.
  max_open_conns: 25
  # Idle connections kept warm for reuse. Keep <= max_open_conns. Higher values
  # cut connection setup latency under bursty load at the cost of holding idle
  # server-side connections; 5 is a reasonable default for a single replica.
  max_idle_conns: 5
  # Maximum lifetime of a pooled connection before it is recycled. Bounds the age
  # of connections so load rebalances after a Postgres failover and stale
  # server-side state does not accumulate; keep it below any proxy/database idle
  # timeout.
  conn_max_lifetime: "1h"

security:
  master_key: ""  # 32-char AES-256 key for credential encryption (openssl rand -hex 16); also accepts a 64-char hex key
  session_secret: ""  # exactly 32 chars for session signing (openssl rand -hex 16)
  csrf_key: ""  # exactly 32 chars for CSRF tokens (openssl rand -hex 16)
  session_duration: "24h"
  # Force the Secure flag on the session cookie. When omitted it is derived from
  # server.base_url (true for https://, false otherwise). Override here or via
  # GITMIRRORS_SECURITY_COOKIE_SECURE (e.g. set true behind a TLS-terminating proxy).
  # cookie_secure: false
  rate_limit:
    auth_requests_per_minute: 10
    api_requests_per_minute: 60

oauth:
  github:
    client_id: ""
    client_secret: ""
    redirect_url: "http://localhost:8080/api/v1/auth/oauth/github/callback"
    scopes: ["read:user", "repo"]
  gitlab:
    client_id: ""
    client_secret: ""
    redirect_url: "http://localhost:8080/api/v1/auth/oauth/gitlab/callback"
    scopes: ["read_api", "read_repository"]
  google:
    client_id: ""
    client_secret: ""
    redirect_url: "http://localhost:8080/api/v1/auth/oauth/google/callback"
    scopes: ["email", "profile"]

email:
  smtp_host: ""
  smtp_port: 587
  smtp_user: ""
  smtp_password: ""
  from: "noreply@gitmirrors.local"
  enabled: false

worker:
  max_concurrent: 3
  clone_timeout: 3600  # seconds
  retry_max_attempts: 3
  retry_base_delay: "30s"

logging:
  level: "info"
  format: "json"
  output: "stdout"  # stdout/file
  file_path: "/app/logs/app.log"

storage:
  base_path: "/app/storage/repos"
  ssh_path: "/app/storage/ssh"
  backup_path: "/app/storage/backups"

monitoring:
  metrics_enabled: true
  metrics_path: "/metrics"
  health_check_interval: "15m"
